<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>Admin Reports</title>
  <style>
    body {
      background: #05070d;
      color: #e6f0ff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    .wrap {
      max-width: 1280px;
      margin: 32px auto;
      padding: 0 20px 40px;
    }
    h1 {
      margin-bottom: 8px;
      font-size: 40px;
      letter-spacing: 1px;
    }
    .sub {
      color: #9fb3d1;
      margin-bottom: 22px;
    }
    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      align-items: center;
    }
    .nav {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .btn {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-blue { background: #2f6fed; color: #fff; }
    .btn-green { background: #18a957; color: #fff; }
    .btn-outline {
      background: #101a2c;
      color: #e6f0ff;
      border: 1px solid #30415f;
    }
    .input, .select {
      min-width: 240px;
      background: #0c1322;
      color: #e6f0ff;
      border: 1px solid #22314f;
      border-radius: 10px;
      padding: 12px 14px;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: 12px;
      margin-bottom: 18px;
    }
    .box, .card, .mini, .detail-block {
      background: #0c1322;
      border: 1px solid #1b2940;
      border-radius: 14px;
    }
    .box {
      padding: 14px;
    }
    .box .label {
      font-size: 12px;
      color: #8fa8d6;
    }
    .box .value {
      font-size: 24px;
      font-weight: 700;
      margin-top: 6px;
    }
    .status {
      margin-bottom: 16px;
      color: #8fa8d6;
    }
    .list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }
    .card {
      padding: 18px;
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .username {
      font-size: 24px;
      font-weight: 700;
    }
    .meta {
      color: #9fb3d1;
      margin-top: 4px;
      line-height: 1.8;
    }
    .score-grid {
      display: grid;
      grid-template-columns: repeat(6,1fr);
      gap: 10px;
      margin-top: 16px;
    }
    .mini {
      padding: 10px 12px;
    }
    .mini .label {
      font-size: 12px;
      color: #8fa8d6;
    }
    .mini .value {
      font-size: 20px;
      font-weight: 700;
      margin-top: 4px;
    }
    .summary-text {
      margin-top: 16px;
      color: #dce8ff;
      line-height: 1.8;
    }
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 16px;
    }
    .detail-block {
      background: #101a2c;
      padding: 14px;
    }
    .detail-title {
      font-weight: 700;
      margin-bottom: 8px;
    }
    .hidden-detail {
      display: none;
      margin-top: 16px;
      background: #0b1629;
      border: 1px solid #1b2940;
      border-radius: 12px;
      padding: 14px;
    }
    ul {
      margin: 0;
      padding-left: 18px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>ADMIN REPORT CENTER</h1>
    <div class="sub">หน้าสรุปรายงานของผู้เล่นทั้งหมดสำหรับผู้ดูแลระบบ</div>

    <div class="nav">
      <a class="btn btn-outline" href="/admin-reports">หน้า Report</a>
      <a class="btn btn-outline" href="/admin-feedback">หน้า Feedback</a>
      <a class="btn btn-outline" href="/admin-round-comparison">หน้าเปรียบเทียบ 3 รอบ</a>
    </div>

    <div class="toolbar">
      <button id="refreshBtn" class="btn btn-blue">โหลดรายงานล่าสุด</button>
      <button id="generateAllBtn" class="btn btn-green">Generate Report ทั้งหมด</button>
      <input id="searchBox" class="input" type="text" placeholder="ค้นหาชื่อผู้เล่น">
      <select id="levelFilter" class="select">
        <option value="">ทุกระดับ</option>
        <option value="Advanced">Advanced</option>
        <option value="Intermediate">Intermediate</option>
        <option value="Developing">Developing</option>
      </select>
    </div>

    <div id="summaryBar" class="summary"></div>
    <div id="statusText" class="status"></div>
    <div id="root">กำลังโหลดข้อมูล...</div>
  </div>

  <script>
    const ORCH_BASE = {{ orch_base|tojson }};
    let ALL_REPORTS = [];

    function safeObj(v) {
      if (v && typeof v === "object") return v;
      if (typeof v === "string") {
        try { return JSON.parse(v); } catch { return {}; }
      }
      return {};
    }

    function safeArray(v) {
      if (Array.isArray(v)) return v;
      if (typeof v === "string") {
        try {
          const parsed = JSON.parse(v);
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }
      return [];
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function miniBox(label, value) {
      return `
        <div class="box">
          <div class="label">${escapeHtml(label)}</div>
          <div class="value">${escapeHtml(value)}</div>
        </div>
      `;
    }

    function scoreBadge(label, value) {
      return `
        <div class="mini">
          <div class="label">${escapeHtml(label)}</div>
          <div class="value">${Number(value || 0)}</div>
        </div>
      `;
    }

    function renderSummaryBar(items) {
      const total = items.length;
      const withReport = items.filter(x => safeObj(x.skill_report).id).length;
      const avgSolve = total ? (items.reduce((s, x) => s + Number(safeObj(x.skill_report).total_solves || 0), 0) / total).toFixed(2) : "0";
      const avgAccuracy = total ? (items.reduce((s, x) => s + Number(safeObj(x.skill_report).accuracy_score || 0), 0) / total).toFixed(2) : "0";

      document.getElementById("summaryBar").innerHTML = [
        miniBox("จำนวนผู้เล่นทั้งหมด", total),
        miniBox("มีรายงานแล้ว", withReport),
        miniBox("ค่าเฉลี่ย Solve", avgSolve),
        miniBox("ค่าเฉลี่ย Accuracy", avgAccuracy + "%"),
      ].join("");
    }

    function renderOneCard(item) {
      const user = item.user_key || "-";
      const s = safeObj(item.skill_report);
      const a = safeObj(item.ai_report);

      if (!s || !s.id) {
        return `
          <div class="card">
            <div class="card-top">
              <div>
                <div class="username">${escapeHtml(user)}</div>
                <div class="meta">ยังไม่มีรายงาน</div>
              </div>
              <button class="btn btn-blue gen-single-btn" data-user="${escapeHtml(user)}">Generate รายงาน</button>
            </div>
          </div>
        `;
      }

      const strengths = safeArray(a.strengths).slice(0, 3);
      const weaknesses = safeArray(a.weaknesses).slice(0, 3);
      const percentile = item.percentile;

      return `
        <div class="card">
          <div class="card-top">
            <div>
              <div class="username">${escapeHtml(user)}</div>
              <div class="meta">
                ระดับ: <b>${escapeHtml(s.overall_level || "-")}</b>
                &nbsp;|&nbsp; Solve: <b>${Number(s.total_solves || 0)}</b>
                &nbsp;|&nbsp; Accuracy: <b>${Number(s.accuracy_score || 0)}</b>
                &nbsp;|&nbsp; Percentile: <b>${percentile === null || percentile === undefined ? "-" : percentile + "%"}</b>
              </div>
            </div>

            <div style="display:flex;gap:10px;flex-wrap:wrap;">
              <button class="btn btn-blue gen-single-btn" data-user="${escapeHtml(user)}">Generate ใหม่</button>
              <button class="btn btn-outline toggle-detail-btn" data-user="${escapeHtml(user)}">ดูรายละเอียด</button>
            </div>
          </div>

          <div class="score-grid">
            ${scoreBadge("Web", s.web_recon_score)}
            ${scoreBadge("Protocol", s.protocol_score)}
            ${scoreBadge("SSH", s.ssh_pivot_score)}
            ${scoreBadge("Blue", s.blue_analysis_score)}
            ${scoreBadge("Persistence", s.persistence_score)}
            ${scoreBadge("Time", s.time_efficiency_score)}
          </div>

          <div class="summary-text">
            <b>AI Summary:</b> ${escapeHtml(a.summary || "ยังไม่มีข้อมูล")}
          </div>

          <div class="two-col">
            <div class="detail-block">
              <div class="detail-title">จุดแข็ง</div>
              <ul>
                ${strengths.length ? strengths.map(x => `<li>${escapeHtml(x)}</li>`).join("") : "<li>-</li>"}
              </ul>
            </div>

            <div class="detail-block">
              <div class="detail-title">จุดที่ควรพัฒนา</div>
              <ul>
                ${weaknesses.length ? weaknesses.map(x => `<li>${escapeHtml(x)}</li>`).join("") : "<li>-</li>"}
              </ul>
            </div>
          </div>

          <div id="detail-${escapeHtml(user)}" class="hidden-detail">
            <div class="detail-title">รายละเอียดเชิงลึก</div>

            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">
              ${scoreBadge("Opened", s.total_opened)}
              ${scoreBadge("Started", s.total_started)}
              ${scoreBadge("Ready", s.total_ready)}
              ${scoreBadge("Wrong", s.total_wrong_submits)}
            </div>

            <div style="margin-top:14px;">
              <div class="detail-title">Recommendations</div>
              <ul>
                ${safeArray(a.recommendations).length ? safeArray(a.recommendations).map(x => `<li>${escapeHtml(x)}</li>`).join("") : "<li>-</li>"}
              </ul>
            </div>

            <div style="margin-top:14px;">
              <div class="detail-title">Evidence</div>
              <ul>
                ${safeArray(a.evidence).length ? safeArray(a.evidence).map(x => `<li>${escapeHtml(x)}</li>`).join("") : "<li>-</li>"}
              </ul>
            </div>
          </div>
        </div>
      `;
    }

    function toggleDetail(user) {
      const el = document.getElementById(`detail-${user}`);
      if (!el) return;
      el.style.display = el.style.display === "none" ? "block" : "none";
    }

    async function fetchAllReports() {
      const res = await fetch(`${ORCH_BASE}/report_all`);
      if (!res.ok) throw new Error(`โหลด report_all ไม่สำเร็จ (${res.status})`);
      return await res.json();
    }

    async function fetchSingleReport(user) {
      const res = await fetch(`${ORCH_BASE}/report/${encodeURIComponent(user)}`);
      if (!res.ok) throw new Error(`โหลด report ของ ${user} ไม่สำเร็จ`);
      return await res.json();
    }

    async function generateSingle(user) {
      const status = document.getElementById("statusText");
      status.innerText = `กำลังสร้างรายงานของ ${user} ...`;

      try {
        const res = await fetch(`${ORCH_BASE}/generate_report/${encodeURIComponent(user)}`, { method: "POST" });
        if (!res.ok) throw new Error(`generate ไม่สำเร็จ (${res.status})`);

        const fresh = await fetchSingleReport(user);
        const idx = ALL_REPORTS.findIndex(x => x.user_key === user);
        if (idx >= 0) ALL_REPORTS[idx] = fresh;
        else ALL_REPORTS.push(fresh);

        renderList();
        status.innerText = `สร้างรายงานของ ${user} สำเร็จ`;
      } catch (e) {
        console.error(e);
        status.innerText = `เกิดข้อผิดพลาด: ${e.message || e}`;
      }
    }

    async function generateAll() {
      const status = document.getElementById("statusText");
      status.innerText = "กำลังสร้างรายงานทั้งหมด ...";

      try {
        const res = await fetch(`${ORCH_BASE}/generate_report_all`, { method: "POST" });
        if (!res.ok) throw new Error(`generate all ไม่สำเร็จ (${res.status})`);

        const all = await fetchAllReports();
        ALL_REPORTS = all.reports || [];
        renderList();
        status.innerText = "สร้างรายงานทั้งหมดสำเร็จ";
      } catch (e) {
        console.error(e);
        status.innerText = `เกิดข้อผิดพลาด: ${e.message || e}`;
      }
    }

    function renderList() {
      const root = document.getElementById("root");
      const q = (document.getElementById("searchBox").value || "").trim().toLowerCase();
      const level = document.getElementById("levelFilter").value;

      const filtered = ALL_REPORTS.filter(r => {
        const userOk = String(r.user_key || "").toLowerCase().includes(q);
        const report = safeObj(r.skill_report);
        const levelOk = !level || String(report.overall_level || "") === level;
        return userOk && levelOk;
      });

      renderSummaryBar(filtered);

      if (!filtered.length) {
        root.innerHTML = `<div style="color:#9fb3d1;">ไม่พบผู้เล่นที่ตรงกับเงื่อนไข</div>`;
        return;
      }

      root.innerHTML = `<div class="list">${filtered.map(renderOneCard).join("")}</div>`;
    }

    document.addEventListener("click", async function (e) {
      const genBtn = e.target.closest(".gen-single-btn");
      if (genBtn) {
        const user = genBtn.dataset.user;
        if (user) await generateSingle(user);
        return;
      }

      const detailBtn = e.target.closest(".toggle-detail-btn");
      if (detailBtn) {
        const user = detailBtn.dataset.user;
        if (user) toggleDetail(user);
      }
    });

    async function initPage() {
      const status = document.getElementById("statusText");

      document.getElementById("refreshBtn").onclick = async () => {
        status.innerText = "กำลังโหลดรายงานล่าสุด ...";
        try {
          const all = await fetchAllReports();
          ALL_REPORTS = all.reports || [];
          renderList();
          status.innerText = "โหลดรายงานล่าสุดสำเร็จ";
        } catch (e) {
          console.error(e);
          status.innerText = `เกิดข้อผิดพลาด: ${e.message || e}`;
        }
      };

      document.getElementById("generateAllBtn").onclick = generateAll;
      document.getElementById("searchBox").addEventListener("input", renderList);
      document.getElementById("levelFilter").addEventListener("change", renderList);

      try {
        const all = await fetchAllReports();
        ALL_REPORTS = all.reports || [];
        renderList();
        status.innerText = "โหลดข้อมูลสำเร็จ";
      } catch (e) {
        console.error(e);
        document.getElementById("root").innerHTML = `
          <div style="background:#2a1212;border:1px solid #5a2323;color:#ffb4b4;padding:16px;border-radius:12px;">
            โหลดรายงานทั้งหมดไม่สำเร็จ<br>
            <span style="font-size:14px;color:#ffd2d2;">${escapeHtml(e.message || e)}</span>
          </div>
        `;
        status.innerText = "เกิดข้อผิดพลาด";
      }
    }

    initPage();
  </script>
</body>
</html>
